[pytest]
# Pytest configuration for linux.py.mysql

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=mysqlpy
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require MySQL instance)
    slow: Slow running tests

# Coverage
[coverage:run]
source = mysqlpy
omit = 
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
